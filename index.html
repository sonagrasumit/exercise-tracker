<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Exercise Tracker</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0e1117;font-family:'Inter',system-ui,-apple-system,sans-serif}input[type=number]::-webkit-inner-spin-button{opacity:1}</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const {useState,useEffect,useCallback,useRef} = React;

// ── Storage (localStorage) ──
const S = {
  get(k){const v=localStorage.getItem("extr_"+k);return v?{key:k,value:v}:null},
  set(k,v){localStorage.setItem("extr_"+k,v);return{key:k,value:v}},
  del(k){localStorage.removeItem("extr_"+k)}
};

const STORAGE_KEY="ex-tracker-v2", SHEETS_URL_KEY="ex-tracker-sheets-url";
const DAYS_SHORT=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const C={bg:"#0e1117",card:"#181d27",border:"#2a3040",accent:"#6c8cff",accentDim:"#4a6adb22",green:"#34d399",greenDim:"#34d39922",red:"#f87171",redDim:"#f8717122",orange:"#fbbf24",orangeDim:"#fbbf2422",text:"#e2e8f0",textDim:"#8892a8",textMuted:"#5a6478",white:"#fff"};
const F="'Inter',system-ui,sans-serif";

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function daysBetween(a,b){const d1=new Date(a),d2=new Date(b);d1.setHours(0,0,0,0);d2.setHours(0,0,0,0);return Math.floor((d2-d1)/864e5)}
function fmtSec(s){const m=Math.floor(s/60),r=s%60;return m>0?`${m}m${r>0?` ${r}s`:''}`:s+'s'}
function fmtDate(d){return new Date(d+"T00:00").toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}
function computeTarget(ex,di){return Math.round((ex.baseValue+(ex.increment||0)*Math.floor(di/(ex.incrementEveryDays||1)))*100)/100}

function isScheduledToday(ex,date){
  const dow=new Date(date+"T00:00").getDay(), s=ex.schedule;
  if(!s||s.type==="daily")return true;
  if(s.type==="specific_days")return(s.days||[]).includes(dow);
  if(s.type==="every_n_days"){const diff=daysBetween(ex.startDate||date,date);return diff>=0&&diff%(s.everyN||1)===0}
  if(s.type==="x_per_week")return true;
  return true;
}
function getWeekCompletions(logs,exId,date){
  const d=new Date(date+"T00:00"),dow=d.getDay(),ws=new Date(d);ws.setDate(ws.getDate()-dow);
  const we=new Date(ws);we.setDate(we.getDate()+6);
  const s=ws.toISOString().slice(0,10),e=we.toISOString().slice(0,10);
  return logs.filter(l=>l.exerciseId===exId&&l.date>=s&&l.date<=e&&l.sets.length>0).length;
}
function scheduleLabel(s){
  if(!s||s.type==="daily")return"Every day";
  if(s.type==="specific_days")return(s.days||[]).map(d=>DAYS_SHORT[d]).join(", ")||"No days";
  if(s.type==="every_n_days")return`Every ${s.everyN} days`;
  if(s.type==="x_per_week")return`${s.timesPerWeek}× per week (flexible)`;
  return"Every day";
}

async function syncToSheets(url,data){
  if(!url)return;
  try{await fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save",data})})}catch(e){console.warn("Sync fail",e)}
}
async function loadFromSheets(url){
  if(!url)return null;
  try{const r=await fetch(url+"?action=load");if(!r.ok)return null;return await r.json()}catch{return null}
}

const defaultData={exercises:[],logs:[],restDays:[]};

// ═══ MAIN ═══
function App(){
  const[data,setData]=useState(null),[loading,setLoading]=useState(true),[view,setView]=useState("today"),[editEx,setEditEx]=useState(null);
  const[sheetsUrl,setSheetsUrl]=useState(""),[syncStatus,setSyncStatus]=useState(null);

  useEffect(()=>{(async()=>{
    let d=defaultData,url="";
    try{const r=S.get(SHEETS_URL_KEY);if(r)url=r.value}catch{}
    try{const r=S.get(STORAGE_KEY);if(r)d=JSON.parse(r.value)}catch{}
    setSheetsUrl(url);
    if(url){const remote=await loadFromSheets(url);if(remote&&remote.exercises)d=remote}
    setData(d);setLoading(false);
  })()},[]);

  const save=useCallback(async(nd)=>{
    setData(nd);try{S.set(STORAGE_KEY,JSON.stringify(nd))}catch{}
    if(sheetsUrl){setSyncStatus("syncing");try{await syncToSheets(sheetsUrl,nd);setSyncStatus("done")}catch{setSyncStatus("error")}setTimeout(()=>setSyncStatus(null),2000)}
  },[sheetsUrl]);

  if(loading)return<div style={{color:C.textDim,padding:40,textAlign:"center",fontFamily:F}}>Loading…</div>;

  const today=todayStr(),isRestDay=data.restDays?.includes(today);
  const tabs=[["today","Today"],["exercises","Exercises"],["history","History"],["settings","⚙"]];

  return(
    <div style={{fontFamily:F,background:C.bg,color:C.text,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:C.bg,zIndex:10}}>
        {tabs.map(([k,l])=><button key={k} onClick={()=>setView(k)} style={{flex:1,padding:"14px 0",border:"none",background:"none",color:view===k?C.accent:C.textDim,fontFamily:F,fontSize:13,fontWeight:600,cursor:"pointer",borderBottom:view===k?`2px solid ${C.accent}`:"2px solid transparent"}}>{l}</button>)}
      </div>
      {syncStatus&&<div style={{textAlign:"center",padding:4,fontSize:11,color:syncStatus==="error"?C.red:C.green,background:syncStatus==="error"?C.redDim:C.greenDim}}>{syncStatus==="syncing"?"Syncing…":syncStatus==="done"?"Synced ✓":"Sync failed"}</div>}
      <div style={{padding:"16px 16px 100px"}}>
        {view==="today"&&<TodayView data={data} save={save} today={today} isRestDay={isRestDay}/>}
        {view==="exercises"&&<ExercisesView data={data} save={save} onAdd={()=>{setEditEx(null);setView("add")}} onEdit={ex=>{setEditEx(ex);setView("add")}}/>}
        {view==="history"&&<HistoryView data={data} save={save}/>}
        {view==="settings"&&<SettingsView sheetsUrl={sheetsUrl} setSheetsUrl={setSheetsUrl} data={data} save={save}/>}
        {view==="add"&&<AddExerciseView data={data} save={save} existing={editEx} onDone={()=>{setEditEx(null);setView("exercises")}}/>}
      </div>
    </div>
  );
}

// ═══ TODAY ═══
function TodayView({data,save,today,isRestDay}){
  const toggleRest=()=>{const rd=data.restDays||[];save({...data,restDays:isRestDay?rd.filter(d=>d!==today):[...rd,today]})};
  const scheduled=data.exercises.filter(ex=>isScheduledToday(ex,today));
  const todayLogs=data.logs.filter(l=>l.date===today);
  const active=scheduled.filter(ex=>{
    if(ex.schedule?.type==="x_per_week"){const done=getWeekCompletions(data.logs,ex.id,today);const logged=todayLogs.some(l=>l.exerciseId===ex.id);if(done>=(ex.schedule.timesPerWeek||3)&&!logged)return false}
    return true;
  });

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontSize:18,fontWeight:700}}>{new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"})}</h2>
        <button onClick={toggleRest} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${isRestDay?C.green:C.border}`,background:isRestDay?C.greenDim:"none",color:isRestDay?C.green:C.textDim,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:F}}>{isRestDay?"✓ Rest Day":"Mark Rest Day"}</button>
      </div>
      {isRestDay?<div style={{textAlign:"center",padding:"50px 20px"}}><div style={{fontSize:40,marginBottom:12}}>😴</div><div style={{fontSize:16,fontWeight:600,color:C.green,marginBottom:6}}>Rest Day</div><div style={{fontSize:13,color:C.textDim}}>Recovery is part of the process.</div></div>
      :active.length===0?<Empty msg="No exercises scheduled for today."/>
      :active.map(ex=><ExerciseCard key={ex.id} ex={ex} data={data} save={save} today={today}/>)}
    </div>
  );
}

// ═══ EXERCISE CARD ═══
function ExerciseCard({ex,data,save,today}){
  const di=Math.max(0,daysBetween(ex.startDate||today,today));
  const target=computeTarget(ex,di);
  const log=data.logs.find(l=>l.date===today&&l.exerciseId===ex.id);
  const sets=log?log.sets:[];
  const done=sets.length>=ex.sets;
  let weekInfo=null;
  if(ex.schedule?.type==="x_per_week")weekInfo={done:getWeekCompletions(data.logs,ex.id,today),target:ex.schedule.timesPerWeek||3};

  const logSet=v=>{const ns=[...sets,v],nl={exerciseId:ex.id,date:today,sets:ns},logs=data.logs.filter(l=>!(l.date===today&&l.exerciseId===ex.id));logs.push(nl);save({...data,logs})};
  const undo=()=>{const ns=sets.slice(0,-1),logs=data.logs.filter(l=>!(l.date===today&&l.exerciseId===ex.id));if(ns.length>0)logs.push({exerciseId:ex.id,date:today,sets:ns});save({...data,logs})};

  return(
    <div style={{background:C.card,borderRadius:12,padding:16,marginBottom:12,border:`1px solid ${done?C.green+"55":C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontWeight:600,fontSize:15}}>{ex.name}</span>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {weekInfo&&<span style={{fontSize:10,color:C.orange,background:C.orangeDim,padding:"2px 6px",borderRadius:4,fontWeight:600}}>{weekInfo.done}/{weekInfo.target} this week</span>}
          <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:6,background:done?C.greenDim:C.accentDim,color:done?C.green:C.accent}}>{sets.length}/{ex.sets} sets</span>
        </div>
      </div>
      <div style={{fontSize:12,color:C.textDim,marginBottom:12}}>
        Target: <strong style={{color:C.text}}>{ex.type==="reps"?`${target} reps`:fmtSec(target)}</strong> per set
        {ex.increment>0&&<span style={{color:C.textMuted,marginLeft:6,fontSize:10}}>day {di+1} · +{ex.increment}{ex.type==="time"?"s":""}/ {ex.incrementEveryDays}d</span>}
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
        {Array.from({length:ex.sets}).map((_,i)=>{const v=sets[i],cur=i===sets.length;return(
          <div key={i} style={{minWidth:40,height:36,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,padding:"0 6px",background:v!=null?C.greenDim:cur?C.accentDim:C.border+"44",color:v!=null?C.green:cur?C.accent:C.textMuted,border:cur?`1.5px solid ${C.accent}44`:"1.5px solid transparent"}}>{v!=null?(ex.type==="time"?fmtSec(v):v):`S${i+1}`}</div>
        )})}
      </div>
      {!done&&(ex.type==="time"?<TimerControl target={target} onLog={logSet}/>:<RepsControl target={target} onLog={logSet}/>)}
      {sets.length>0&&<button onClick={undo} style={{marginTop:8,background:"none",border:"none",color:C.textMuted,fontSize:11,cursor:"pointer",fontFamily:F,padding:0}}>↩ Undo last</button>}
    </div>
  );
}

// ═══ TIMER ═══
function TimerControl({target,onLog}){
  const[running,setRunning]=useState(false),[elapsed,setElapsed]=useState(0);
  const iRef=useRef(null),sRef=useRef(null);
  const start=()=>{setRunning(true);sRef.current=Date.now()-elapsed*1000;iRef.current=setInterval(()=>setElapsed(Math.floor((Date.now()-sRef.current)/1000)),200)};
  const pause=()=>{setRunning(false);clearInterval(iRef.current)};
  const reset=()=>{pause();setElapsed(0)};
  const logIt=s=>{onLog(s);reset()};
  useEffect(()=>()=>clearInterval(iRef.current),[]);
  const pct=Math.min(100,elapsed/target*100),over=elapsed>=target;

  return(
    <div>
      <div style={{height:6,borderRadius:3,background:C.border,marginBottom:10,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:pct+"%",background:over?C.green:C.accent,transition:"width 0.3s"}}/></div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <span style={{fontSize:28,fontWeight:700,fontVariantNumeric:"tabular-nums",color:over?C.green:C.text,minWidth:90}}>{fmtSec(elapsed)}</span>
        <span style={{fontSize:12,color:C.textMuted}}>/ {fmtSec(target)}</span>
      </div>
      <div style={{display:"flex",gap:8}}>
        {!running?<Btn color={C.accent} onClick={start} flex>{elapsed>0?"Resume":"Start"}</Btn>:<Btn color={C.orange} onClick={pause} flex>Pause</Btn>}
        {elapsed>0&&!running&&<><Btn color={C.green} onClick={()=>logIt(elapsed)}>Log {fmtSec(elapsed)}</Btn><Btn color={C.textMuted} onClick={reset} outline>Reset</Btn></>}
      </div>
      {!running&&elapsed===0&&<button onClick={()=>logIt(target)} style={{marginTop:8,background:"none",border:"none",color:C.textMuted,fontSize:11,cursor:"pointer",fontFamily:F,padding:0}}>or log {fmtSec(target)} without timer →</button>}
    </div>
  );
}

// ═══ REPS COUNTER ═══
function RepsControl({target,onLog}){
  const[counting,setCounting]=useState(false),[count,setCount]=useState(0);
  const reset=()=>{setCounting(false);setCount(0)};
  const logIt=v=>{onLog(v);reset()};
  if(!counting)return<div style={{display:"flex",gap:8}}><Btn color={C.accent} onClick={()=>logIt(target)} flex>Log {target} reps</Btn><Btn color={C.textDim} onClick={()=>{setCount(0);setCounting(true)}} outline>Count</Btn></div>;
  const cbs={width:48,height:48,borderRadius:24,border:`2px solid ${C.border}`,background:C.card,color:C.text,fontSize:22,fontWeight:600,cursor:"pointer",fontFamily:F,display:"flex",alignItems:"center",justifyContent:"center"};
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,marginBottom:12}}>
        <button onClick={()=>setCount(Math.max(0,count-1))} style={cbs}>−</button>
        <div style={{textAlign:"center"}}><div style={{fontSize:36,fontWeight:700,color:count>=target?C.green:C.text,fontVariantNumeric:"tabular-nums"}}>{count}</div><div style={{fontSize:11,color:C.textMuted}}>/ {target} reps</div></div>
        <button onClick={()=>setCount(count+1)} style={{...cbs,background:C.accent,color:C.white,borderColor:C.accent}}>+</button>
      </div>
      <div style={{display:"flex",gap:8}}><Btn color={C.green} onClick={()=>logIt(count)} flex>Log {count}</Btn><Btn color={C.textMuted} onClick={reset} outline>Cancel</Btn></div>
    </div>
  );
}

// ═══ EXERCISES LIST ═══
function ExercisesView({data,save,onAdd,onEdit}){
  const del=id=>save({...data,exercises:data.exercises.filter(e=>e.id!==id),logs:data.logs.filter(l=>l.exerciseId!==id)});
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontSize:18,fontWeight:700,margin:0}}>Exercises</h2><Btn color={C.accent} onClick={onAdd}>+ Add</Btn></div>
      {data.exercises.length===0&&<Empty msg="No exercises yet."/>}
      {data.exercises.map(ex=>(
        <div key={ex.id} style={{background:C.card,borderRadius:10,padding:14,marginBottom:10,border:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{ex.name}</div>
              <div style={{fontSize:12,color:C.textDim}}>{ex.type==="reps"?`${ex.baseValue} reps`:fmtSec(ex.baseValue)} × {ex.sets} sets{ex.increment>0&&<span> · +{ex.increment}{ex.type==="time"?"s":""}/ {ex.incrementEveryDays}d</span>}</div>
              <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{scheduleLabel(ex.schedule)}</div>
            </div>
            <div style={{display:"flex",gap:6}}><SmallBtn onClick={()=>onEdit(ex)}>Edit</SmallBtn><SmallBtn onClick={()=>del(ex.id)} color={C.red}>Del</SmallBtn></div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ═══ ADD/EDIT ═══
function AddExerciseView({data,save,existing,onDone}){
  const[name,setName]=useState(existing?.name||""),[type,setType]=useState(existing?.type||"reps");
  const[baseValue,setBV]=useState(existing?.baseValue?.toString()||""),[sets,setSets]=useState(existing?.sets?.toString()||"3");
  const[increment,setInc]=useState(existing?.increment?.toString()||"0"),[incDays,setID]=useState(existing?.incrementEveryDays?.toString()||"7");
  const[schedType,setST]=useState(existing?.schedule?.type||"daily"),[schedDays,setSD]=useState(existing?.schedule?.days||[]);
  const[everyN,setEN]=useState(existing?.schedule?.everyN?.toString()||"2"),[xpw,setXPW]=useState(existing?.schedule?.timesPerWeek?.toString()||"3");
  const toggleDay=d=>setSD(schedDays.includes(d)?schedDays.filter(x=>x!==d):[...schedDays,d]);

  const handleSave=()=>{
    if(!name.trim()||!baseValue)return;
    let schedule={type:schedType};
    if(schedType==="specific_days")schedule.days=schedDays;
    if(schedType==="every_n_days")schedule.everyN=Number(everyN)||2;
    if(schedType==="x_per_week")schedule.timesPerWeek=Number(xpw)||3;
    const ex={id:existing?.id||uid(),name:name.trim(),type,baseValue:Number(baseValue),sets:Number(sets)||3,increment:Number(increment)||0,incrementEveryDays:Number(incDays)||7,startDate:existing?.startDate||todayStr(),schedule};
    const exercises=existing?data.exercises.map(e=>e.id===ex.id?ex:e):[...data.exercises,ex];
    save({...data,exercises});onDone();
  };

  const ist={width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:14,fontFamily:F,boxSizing:"border-box"};
  const lb={fontSize:12,fontWeight:600,color:C.textDim,marginBottom:6};

  return(
    <div>
      <h2 style={{fontSize:18,fontWeight:700,margin:"4px 0 20px"}}>{existing?"Edit exercise":"New exercise"}</h2>
      <div style={{marginBottom:16}}><div style={lb}>Name</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Push-ups" style={ist}/></div>
      <div style={{marginBottom:16}}><div style={lb}>Type</div><div style={{display:"flex",gap:8}}>{[["reps","Reps × Sets"],["time","Time × Sets"]].map(([t,l])=><ToggleBtn key={t} active={type===t} onClick={()=>setType(t)}>{l}</ToggleBtn>)}</div></div>
      <div style={{display:"flex",gap:12,marginBottom:16}}>
        <div style={{flex:1}}><div style={lb}>{type==="reps"?"Reps per set":"Seconds per set"}</div><input type="number" value={baseValue} onChange={e=>setBV(e.target.value)} placeholder={type==="reps"?"10":"30"} style={ist}/></div>
        <div style={{flex:1}}><div style={lb}>Sets</div><input type="number" value={sets} onChange={e=>setSets(e.target.value)} placeholder="3" style={ist}/></div>
      </div>

      {/* Schedule */}
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:16}}>
        <div style={lb}>Schedule</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>{[["daily","Daily"],["specific_days","Specific days"],["every_n_days","Every N days"],["x_per_week","X per week"]].map(([t,l])=><ToggleBtn key={t} active={schedType===t} onClick={()=>setST(t)} small>{l}</ToggleBtn>)}</div>
        {schedType==="specific_days"&&<div style={{display:"flex",gap:4,marginTop:8}}>{DAYS_SHORT.map((d,i)=><button key={i} onClick={()=>toggleDay(i)} style={{flex:1,padding:"8px 0",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:F,border:`1px solid ${schedDays.includes(i)?C.accent:C.border}`,background:schedDays.includes(i)?C.accentDim:"none",color:schedDays.includes(i)?C.accent:C.textMuted}}>{d}</button>)}</div>}
        {schedType==="every_n_days"&&<div style={{marginTop:8}}><div style={{...lb,fontSize:11,color:C.textMuted}}>Every how many days?</div><input type="number" value={everyN} onChange={e=>setEN(e.target.value)} style={ist}/></div>}
        {schedType==="x_per_week"&&<div style={{marginTop:8}}><div style={{...lb,fontSize:11,color:C.textMuted}}>Times per week</div><input type="number" value={xpw} onChange={e=>setXPW(e.target.value)} style={ist}/></div>}
      </div>

      {/* Progression */}
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:20}}>
        <div style={lb}>Progression (optional)</div>
        <div style={{display:"flex",gap:12}}>
          <div style={{flex:1}}><div style={{...lb,fontSize:11,color:C.textMuted}}>+{type==="reps"?"reps":"seconds"}</div><input type="number" value={increment} onChange={e=>setInc(e.target.value)} placeholder="0" style={ist}/></div>
          <div style={{flex:1}}><div style={{...lb,fontSize:11,color:C.textMuted}}>Every N days</div><input type="number" value={incDays} onChange={e=>setID(e.target.value)} placeholder="7" style={ist}/></div>
        </div>
        {Number(increment)>0&&<div style={{marginTop:10,fontSize:11,color:C.textMuted}}>Day 1→{type==="reps"?baseValue:fmtSec(+baseValue)}, Day {+incDays+1}→{type==="reps"?+baseValue+(+increment):fmtSec(+baseValue+(+increment))}, Day {+incDays*2+1}→{type==="reps"?+baseValue+(+increment)*2:fmtSec(+baseValue+(+increment)*2)}</div>}
      </div>

      <div style={{display:"flex",gap:10}}>
        <Btn color={C.textDim} onClick={onDone} outline flex>Cancel</Btn>
        <Btn color={C.accent} onClick={handleSave} flex style={{opacity:name.trim()&&baseValue?1:0.4}}>{existing?"Save":"Add"}</Btn>
      </div>
    </div>
  );
}

// ═══ HISTORY ═══
function HistoryView({data,save}){
  const dates=[...new Set([...data.logs.map(l=>l.date),...(data.restDays||[])])].sort().reverse();
  if(dates.length===0)return<Empty msg="No history yet."/>;
  const clearDay=date=>save({...data,logs:data.logs.filter(l=>l.date!==date),restDays:(data.restDays||[]).filter(d=>d!==date)});
  return(
    <div>
      <h2 style={{fontSize:18,fontWeight:700,margin:"4px 0 16px"}}>History</h2>
      {dates.map(date=>{const dl=data.logs.filter(l=>l.date===date),ir=(data.restDays||[]).includes(date);return(
        <div key={date} style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:12,fontWeight:600,color:C.textDim}}>{fmtDate(date)}</span>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>{ir&&<span style={{fontSize:10,color:C.green,background:C.greenDim,padding:"2px 6px",borderRadius:4}}>Rest</span>}<button onClick={()=>clearDay(date)} style={{background:"none",border:"none",color:C.textMuted,fontSize:10,cursor:"pointer",fontFamily:F}}>clear</button></div>
          </div>
          {dl.map((log,i)=>{const ex=data.exercises.find(e=>e.id===log.exerciseId);return(
            <div key={i} style={{background:C.card,borderRadius:8,padding:"10px 14px",marginBottom:4,border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:500}}>{ex?.name||"Deleted"}</span>
              <span style={{fontSize:12,color:C.textDim}}>{log.sets.map(s=>ex?.type==="time"?fmtSec(s):s).join(" · ")}</span>
            </div>
          )})}
          {dl.length===0&&ir&&<div style={{fontSize:12,color:C.textMuted,padding:"4px 0"}}>Rest day</div>}
        </div>
      )})}
    </div>
  );
}

// ═══ SETTINGS ═══
function SettingsView({sheetsUrl,setSheetsUrl,data,save}){
  const[url,setUrl]=useState(sheetsUrl),[saved,setSaved]=useState(false);
  const saveUrl=async()=>{setSheetsUrl(url);try{S.set(SHEETS_URL_KEY,url)}catch{}setSaved(true);setTimeout(()=>setSaved(false),2000);if(url)syncToSheets(url,data)};
  const exportData=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.download="exercise-data.json";a.click()};

  const ist={width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:14,fontFamily:F,boxSizing:"border-box"};
  const lb={fontSize:12,fontWeight:600,color:C.textDim,marginBottom:6};

  return(
    <div>
      <h2 style={{fontSize:18,fontWeight:700,margin:"4px 0 20px"}}>Settings</h2>
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:16}}>
        <div style={lb}>Google Sheets Sync</div>
        <div style={{fontSize:12,color:C.textDim,marginBottom:10}}>Paste your Apps Script web app URL.</div>
        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec" style={ist}/>
        <div style={{display:"flex",gap:8,marginTop:10}}><Btn color={C.accent} onClick={saveUrl}>{saved?"Saved ✓":"Save URL"}</Btn>{sheetsUrl&&<Btn color={C.green} onClick={()=>syncToSheets(sheetsUrl,data)} outline>Sync now</Btn>}</div>
      </div>
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:16}}>
        <div style={lb}>Data</div>
        <div style={{display:"flex",gap:8}}><Btn color={C.accent} onClick={exportData} outline>Export JSON</Btn><Btn color={C.red} onClick={()=>save(defaultData)} outline>Reset all</Btn></div>
      </div>
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`}}>
        <div style={lb}>Apps Script Code</div>
        <div style={{fontSize:11,color:C.textDim,marginBottom:8}}>Create Google Sheet → Extensions → Apps Script → paste this → Deploy as Web App (access: Anyone)</div>
        <pre style={{background:C.bg,borderRadius:8,padding:12,fontSize:10,fontFamily:"monospace",color:C.textDim,whiteSpace:"pre-wrap",overflowX:"auto",lineHeight:1.5}}>{`function doGet(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Data");
  if (!sheet) return json({});
  var val = sheet.getRange("A1").getValue();
  return json(val ? JSON.parse(val) : {});
}
function doPost(e) {
  var body = JSON.parse(e.postData.contents);
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName("Data") || ss.insertSheet("Data");
  sheet.getRange("A1").setValue(JSON.stringify(body.data));
  return json({ ok: true });
}
function json(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}`}</pre>
      </div>
    </div>
  );
}

// ═══ UI PRIMITIVES ═══
function Btn({color,onClick,children,outline,flex,style:s}){return<button onClick={onClick} style={{padding:"10px 16px",borderRadius:8,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:F,border:outline?`1px solid ${color}44`:"none",background:outline?"none":color,color:outline?color:C.white,flex:flex?1:undefined,...s}}>{children}</button>}
function SmallBtn({onClick,children,color}){return<button onClick={onClick} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:"none",color:color||C.textDim,fontSize:11,cursor:"pointer",fontFamily:F}}>{children}</button>}
function ToggleBtn({active,onClick,children,small}){return<button onClick={onClick} style={{flex:1,padding:small?"8px 10px":"10px 0",borderRadius:8,border:`1px solid ${active?C.accent:C.border}`,background:active?C.accentDim:"none",color:active?C.accent:C.textDim,fontWeight:600,fontSize:small?11:13,cursor:"pointer",fontFamily:F}}>{children}</button>}
function Empty({msg}){return<div style={{textAlign:"center",padding:"60px 20px",color:C.textMuted,fontSize:14}}>{msg}</div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
