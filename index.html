<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e1117;font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom,0)}
input[type=number]::-webkit-inner-spin-button{opacity:1}
input,button{font-size:16px}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(max-width:380px){
  .pill-grid{gap:4px!important}
  .pill-grid>div{min-width:36px!important;height:34px!important;font-size:9px!important}
}
@media(min-width:600px){
  #root>div{border-left:1px solid #2a3040;border-right:1px solid #2a3040}
}

  get(k){const v=localStorage.getItem("extr_"+k);return v?{key:k,value:v}:null},
  set(k,v){localStorage.setItem("extr_"+k,v);return{key:k,value:v}},
};

const STORAGE_KEY="ex-tracker-v3", SHEETS_URL_KEY="ex-tracker-sheets-url";
const DAYS_SHORT=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function daysBetween(a,b){const d1=new Date(a),d2=new Date(b);d1.setHours(0,0,0,0);d2.setHours(0,0,0,0);return Math.floor((d2-d1)/864e5)}
function fmtSec(s){const m=Math.floor(s/60),r=s%60;return m>0?`${m}m${r>0?` ${r}s`:''}`:s+'s'}
function fmtDate(d){return new Date(d+"T00:00").toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}

// ── Audio unlock on first interaction ──
let _audioUnlocked=false;
function unlockAudio(){
  if(_audioUnlocked)return;
  _audioUnlocked=true;
  try{
    if(!_alarmCtx)_alarmCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(_alarmCtx.state==="suspended")_alarmCtx.resume();
    // Pre-decode alarm buffer in background
    getAlarmBuffer();
  }catch{}
}
document.addEventListener("click",unlockAudio,{once:false});
document.addEventListener("touchstart",unlockAudio,{once:false});

let _alarmBuffer=null;
let _alarmSource=null;
let _alarmCtx=null;

// Pre-decode the mp3 into an AudioBuffer on first use
async function getAlarmBuffer(){
  if(_alarmBuffer)return _alarmBuffer;
  try{
    if(!_alarmCtx)_alarmCtx=new(window.AudioContext||window.webkitAudioContext)();
    // Decode base64 to ArrayBuffer
    const b64=ALARM_SRC.split(",")[1];
    const bin=atob(b64);
    const buf=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
    _alarmBuffer=await _alarmCtx.decodeAudioData(buf.buffer);
    return _alarmBuffer;
  }catch(e){console.warn("Decode failed",e);return null}
}

async function startAlarm(){
  stopAlarm();
  const buffer=await getAlarmBuffer();
  if(buffer&&_alarmCtx){
    if(_alarmCtx.state==="suspended")await _alarmCtx.resume();
    _alarmSource=_alarmCtx.createBufferSource();
    _alarmSource.buffer=buffer;
    _alarmSource.loop=true;
    _alarmSource.connect(_alarmCtx.destination);
    _alarmSource.start(0);
    return;
  }
  // Fallback: Web Audio beeps
  startFallbackAlarm();
}

let _fallbackInterval=null;
function startFallbackAlarm(){
  const ctx=_alarmCtx||new(window.AudioContext||window.webkitAudioContext)();
  _alarmCtx=ctx;
  if(ctx.state==="suspended")ctx.resume();
  function beep(){
    try{
      for(let i=0;i<3;i++){
        const o=ctx.createOscillator();
        const g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=880;o.type="square";
        g.gain.value=0.35;
        const t=ctx.currentTime+i*0.18;
        o.start(t);o.stop(t+0.12);
        g.gain.setValueAtTime(0.35,t);
        g.gain.exponentialRampToValueAtTime(0.01,t+0.12);
      }
    }catch{}
  }
  beep();
  _fallbackInterval=setInterval(beep,1200);
}

function stopAlarm(){
  try{if(_alarmSource){_alarmSource.stop();_alarmSource.disconnect();_alarmSource=null}}catch{}
  if(_fallbackInterval){clearInterval(_fallbackInterval);_fallbackInterval=null}
}

// ═══ CORE: compute today's target ═══
// Returns { perSet: number, sets: number, breakdown: number[] }
function computeDayTarget(ex, dateStr) {
  const di = Math.max(0, daysBetween(ex.startDate || dateStr, dateStr));

  // Value progression (capped by maxPerSet)
  const valSteps = Math.floor(di / (ex.incrementEveryDays || 1));
  let perSet = ex.baseValue + (ex.increment || 0) * valSteps;
  perSet = Math.round(perSet * 100) / 100;
  if (ex.maxPerSet > 0 && perSet > ex.maxPerSet) perSet = ex.maxPerSet;

  // Set progression
  const setSteps = Math.floor(di / (ex.setIncrementEveryDays || 1));
  const sets = ex.sets + (ex.setIncrement || 0) * setSteps;

  const breakdown = [];
  for (let i = 0; i < sets; i++) breakdown.push(perSet);
  return { perSet, sets, breakdown, dayIndex: di };
}

function isScheduledToday(ex,date){
  const dow=new Date(date+"T00:00").getDay(), s=ex.schedule;
  if(!s||s.type==="daily")return true;
  if(s.type==="specific_days")return(s.days||[]).includes(dow);
  if(s.type==="every_n_days"){const diff=daysBetween(ex.startDate||date,date);return diff>=0&&diff%(s.everyN||1)===0}
  if(s.type==="x_per_week")return true;
  return true;
}
function getWeekCompletions(logs,exId,date){
  const d=new Date(date+"T00:00"),dow=d.getDay(),ws=new Date(d);ws.setDate(ws.getDate()-dow);
  const we=new Date(ws);we.setDate(we.getDate()+6);
  const s=ws.toISOString().slice(0,10),e=we.toISOString().slice(0,10);
  return logs.filter(l=>l.exerciseId===exId&&l.date>=s&&l.date<=e&&l.sets.length>0).length;
}
function scheduleLabel(s){
  if(!s||s.type==="daily")return"Every day";
  if(s.type==="specific_days")return(s.days||[]).map(d=>DAYS_SHORT[d]).join(", ")||"No days";
  if(s.type==="every_n_days")return`Every ${s.everyN} days`;
  if(s.type==="x_per_week")return`${s.timesPerWeek}× / week (flexible)`;
  return"Every day";
}

async function syncToSheets(url,data){
  if(!url)return;
  try{
    // text/plain is CORS-safelisted, survives mode:"no-cors" (application/json gets stripped)
    await fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=UTF-8"},body:JSON.stringify({action:"save",data})});
  }catch(e){console.warn("Sync fail",e)}
}
async function loadFromSheets(url){
  if(!url)return null;
  try{
    // Apps Script redirects; fetch follows by default
    const r=await fetch(url+"?action=load",{redirect:"follow"});
    if(!r.ok)return null;
    const text=await r.text();
    try{return JSON.parse(text)}catch{return null}
  }catch{return null}
}

const defaultData={exercises:[],logs:[],restDays:[]};

// ═══ APP ═══
function App(){
  const[data,setData]=useState(null),[loading,setLoading]=useState(true),[view,setView]=useState("today"),[editEx,setEditEx]=useState(null);
  const[sheetsUrl,setSheetsUrl]=useState(""),[syncStatus,setSyncStatus]=useState(null);

  useEffect(()=>{(async()=>{
    let d=defaultData,url="";
    try{const r=STO.get(SHEETS_URL_KEY);if(r)url=r.value}catch{}
    try{const r=STO.get(STORAGE_KEY);if(r)d=JSON.parse(r.value)}catch{}
    setSheetsUrl(url);
    if(url){const remote=await loadFromSheets(url);if(remote&&remote.exercises)d=remote}
    setData(d);setLoading(false);
  })()},[]);

  const save=useCallback(async(nd)=>{
    setData(nd);try{STO.set(STORAGE_KEY,JSON.stringify(nd))}catch{}
    if(sheetsUrl){setSyncStatus("syncing");try{await syncToSheets(sheetsUrl,nd);setSyncStatus("done")}catch{setSyncStatus("error")}setTimeout(()=>setSyncStatus(null),2000)}
  },[sheetsUrl]);

  if(loading)return<div style={{color:C.textDim,padding:40,textAlign:"center",fontFamily:F}}>Loading…</div>;

  const today=todayStr(),isRestDay=data.restDays?.includes(today);
  const tabs=[["today","Today"],["exercises","Exercises"],["profile","Profile"],["history","History"],["settings","⚙"]];

  return(
    <div style={{fontFamily:F,background:C.bg,color:C.text,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:C.bg,zIndex:10}}>
        {tabs.map(([k,l])=><button key={k} onClick={()=>setView(k)} style={{flex:1,padding:"14px 0",border:"none",background:"none",color:view===k?C.accent:C.textDim,fontFamily:F,fontSize:13,fontWeight:600,cursor:"pointer",borderBottom:view===k?`2px solid ${C.accent}`:"2px solid transparent"}}>{l}</button>)}
      </div>
      {syncStatus&&<div style={{textAlign:"center",padding:4,fontSize:11,color:syncStatus==="error"?C.red:C.green,background:syncStatus==="error"?C.redDim:C.greenDim}}>{syncStatus==="syncing"?"Syncing…":syncStatus==="done"?"Synced ✓":"Sync failed"}</div>}
      <div style={{padding:"16px 16px 100px"}}>
        {view==="today"&&<TodayView data={data} save={save} today={today} isRestDay={isRestDay}/>}
        {view==="exercises"&&<ExercisesView data={data} save={save} onAdd={()=>{setEditEx(null);setView("add")}} onEdit={ex=>{setEditEx(ex);setView("add")}}/>}
        {view==="history"&&<HistoryView data={data} save={save}/>}
        {view==="profile"&&<ProfileView data={data}/>}
        {view==="settings"&&<SettingsView sheetsUrl={sheetsUrl} setSheetsUrl={setSheetsUrl} data={data} save={save}/>}
        {view==="add"&&<AddExerciseView data={data} save={save} existing={editEx} onDone={()=>{setEditEx(null);setView("exercises")}}/>}
      </div>
    </div>
  );
}

// ═══ TODAY ═══
function TodayView({data,save,today,isRestDay}){
  const toggleRest=()=>{const rd=data.restDays||[];save({...data,restDays:isRestDay?rd.filter(d=>d!==today):[...rd,today]})};
  const scheduled=data.exercises.filter(ex=>isScheduledToday(ex,today));
  const todayLogs=data.logs.filter(l=>l.date===today);
  const active=scheduled.filter(ex=>{
    if(ex.schedule?.type==="x_per_week"){const done=getWeekCompletions(data.logs,ex.id,today);const logged=todayLogs.some(l=>l.exerciseId===ex.id);if(done>=(ex.schedule.timesPerWeek||3)&&!logged)return false}
    return true;
  });

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontSize:18,fontWeight:700}}>{new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"})}</h2>
        <button onClick={toggleRest} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${isRestDay?C.green:C.border}`,background:isRestDay?C.greenDim:"none",color:isRestDay?C.green:C.textDim,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:F}}>{isRestDay?"✓ Rest Day":"Mark Rest Day"}</button>
      </div>
      {isRestDay?<div style={{textAlign:"center",padding:"50px 20px"}}><div style={{fontSize:40,marginBottom:12}}>😴</div><div style={{fontSize:16,fontWeight:600,color:C.green,marginBottom:6}}>Rest Day</div><div style={{fontSize:13,color:C.textDim}}>Recovery is part of the process.</div></div>
      :active.length===0?<Empty msg="No exercises scheduled today."/>
      :active.map(ex=><ExerciseCard key={ex.id} ex={ex} data={data} save={save} today={today}/>)}
    </div>
  );
}

// ═══ EXERCISE CARD ═══
function ExerciseCard({ex,data,save,today}){
  const target = computeDayTarget(ex, today);
  const {breakdown, sets: totalSets, dayIndex} = target;
  const log=data.logs.find(l=>l.date===today&&l.exerciseId===ex.id);
  const completedSets=log?log.sets:[];
  const done=completedSets.length>=totalSets;
  let weekInfo=null;
  if(ex.schedule?.type==="x_per_week")weekInfo={done:getWeekCompletions(data.logs,ex.id,today),target:ex.schedule.timesPerWeek||3};

  const logSet=v=>{const ns=[...completedSets,v],nl={exerciseId:ex.id,date:today,sets:ns},logs=data.logs.filter(l=>!(l.date===today&&l.exerciseId===ex.id));logs.push(nl);save({...data,logs})};
  const undo=()=>{const ns=completedSets.slice(0,-1),logs=data.logs.filter(l=>!(l.date===today&&l.exerciseId===ex.id));if(ns.length>0)logs.push({exerciseId:ex.id,date:today,sets:ns});save({...data,logs})};

  // Current set's target value
  const currentSetIndex = completedSets.length;
  const currentTarget = currentSetIndex < breakdown.length ? breakdown[currentSetIndex] : breakdown[breakdown.length-1];

  return(
    <div style={{background:C.card,borderRadius:12,padding:16,marginBottom:12,border:`1px solid ${done?C.green+"55":C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontWeight:600,fontSize:15}}>{ex.name}</span>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {weekInfo&&<span style={{fontSize:10,color:C.orange,background:C.orangeDim,padding:"2px 6px",borderRadius:4,fontWeight:600}}>{weekInfo.done}/{weekInfo.target} /wk</span>}
          <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:6,background:done?C.greenDim:C.accentDim,color:done?C.green:C.accent}}>{completedSets.length}/{totalSets} sets</span>
        </div>
      </div>

      {/* Progression info */}
      <div style={{fontSize:12,color:C.textDim,marginBottom:4}}>
        Day {dayIndex+1}
        {ex.increment>0&&<span> · value +{ex.increment}{ex.type==="time"?"s":""}/ {ex.incrementEveryDays}d</span>}
        {ex.setIncrement>0&&<span> · sets +{ex.setIncrement}/ {ex.setIncrementEveryDays}d</span>}
        {ex.maxPerSet>0&&<span> · cap {ex.type==="time"?fmtSec(ex.maxPerSet):ex.maxPerSet}/set</span>}
      </div>

      {/* Set pills with individual targets */}
      <div className="pill-grid" style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12,marginTop:10}}>
        {breakdown.map((setTarget,i)=>{
          const v=completedSets[i];
          const cur=i===completedSets.length;
          const isLastPartial = ex.maxPerSet > 0 && setTarget < ex.maxPerSet;
          return(
            <div key={i} style={{position:"relative",minWidth:44,height:40,borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,padding:"0 6px",
              background:v!=null?C.greenDim:cur?C.accentDim:C.border+"44",
              color:v!=null?C.green:cur?C.accent:C.textMuted,
              border:cur?`1.5px solid ${C.accent}44`:"1.5px solid transparent"}}>
              <div style={{fontSize:v!=null?11:9,lineHeight:1.2}}>{v!=null?(ex.type==="time"?fmtSec(v):v):(ex.type==="time"?fmtSec(setTarget):setTarget)}</div>
              {v==null&&<div style={{fontSize:8,opacity:0.6}}>S{i+1}</div>}
              {v!=null&&<div style={{fontSize:8,opacity:0.6}}>✓</div>}
            </div>
          );
        })}
      </div>

      {/* Log controls */}
      {!done&&(
        ex.type==="time"
          ?<TimerControl target={currentTarget} onLog={logSet} setNum={currentSetIndex+1}/>
          :<RepsControl target={currentTarget} onLog={logSet} setNum={currentSetIndex+1}/>
      )}
      {completedSets.length>0&&<button onClick={undo} style={{marginTop:8,background:"none",border:"none",color:C.textMuted,fontSize:11,cursor:"pointer",fontFamily:F,padding:0}}>↩ Undo last</button>}
    </div>
  );
}

// ═══ TIMER (background-safe) ═══
function TimerControl({target,onLog,setNum}){
  const[running,setRunning]=useState(false);
  const[elapsed,setElapsed]=useState(0);
  const[completed,setCompleted]=useState(false); // target reached, alarm ringing
  const startTimeRef=useRef(null);
  const rafRef=useRef(null);
  const alarmed=useRef(false);

  const autoStop=useCallback(()=>{
    // Stop the RAF loop and start alarm
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null}
    setRunning(false);
    setCompleted(true);
    startAlarm();
  },[]);

  const tick=useCallback(()=>{
    if(startTimeRef.current!=null){
      const now=Math.floor((Date.now()-startTimeRef.current)/1000);
      setElapsed(now);
      if(now>=target&&!alarmed.current){alarmed.current=true;autoStop();return}
    }
    rafRef.current=requestAnimationFrame(tick);
  },[target,autoStop]);

  // On visibility change, recalc and trigger if crossed target while away
  useEffect(()=>{
    const onVis=()=>{
      if(document.visibilityState==="visible"&&startTimeRef.current!=null){
        const now=Math.floor((Date.now()-startTimeRef.current)/1000);
        setElapsed(now);
        if(now>=target&&!alarmed.current){alarmed.current=true;autoStop()}
      }
    };
    document.addEventListener("visibilitychange",onVis);
    return()=>document.removeEventListener("visibilitychange",onVis);
  },[target,autoStop]);

  useEffect(()=>()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);stopAlarm()},[]);

  const start=()=>{
    const now=Date.now();
    if(startTimeRef.current==null)startTimeRef.current=now-elapsed*1000;
    setRunning(true);
    rafRef.current=requestAnimationFrame(tick);
    try{navigator.wakeLock?.request("screen").catch(()=>{})}catch{}
  };

  const pause=()=>{
    setRunning(false);
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null}
    if(startTimeRef.current!=null)setElapsed(Math.floor((Date.now()-startTimeRef.current)/1000));
  };

  const reset=()=>{
    pause();stopAlarm();
    setElapsed(0);setCompleted(false);
    startTimeRef.current=null;alarmed.current=false;
  };

  const complete=()=>{
    stopAlarm();
    onLog(Math.max(elapsed,target));
    reset();
  };

  const logIt=s=>{stopAlarm();onLog(s);reset()};
  const pct=Math.min(100,elapsed/target*100);
  const gold="#f6c744";

  return(
    <div style={completed?{background:"#f6c74412",borderRadius:10,padding:12,margin:"-4px -4px 0",border:"1px solid #f6c74444",animation:"goldpulse 1.2s ease-in-out infinite alternate"}:{}}>
      <style>{`@keyframes goldpulse{0%{box-shadow:0 0 8px #f6c74422}100%{box-shadow:0 0 24px #f6c74466}}`}</style>
      <div style={{fontSize:11,color:completed?gold:C.textMuted,marginBottom:6,fontWeight:completed?700:400}}>
        {completed?"✦ Time's up! ✦":`Set ${setNum} → ${fmtSec(target)}`}
      </div>
      <div style={{height:6,borderRadius:3,background:C.border,marginBottom:10,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:3,width:pct+"%",background:completed?gold:C.accent,transition:"width 0.3s"}}/>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <span style={{fontSize:28,fontWeight:700,fontVariantNumeric:"tabular-nums",color:completed?gold:C.text,minWidth:90}}>{fmtSec(elapsed)}</span>
        <span style={{fontSize:12,color:C.textMuted}}>/ {fmtSec(target)}</span>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {completed?(
          <Btn color={gold} onClick={complete} flex style={{color:"#000",fontSize:15}}>✓ Complete</Btn>
        ):(<>
          {!running?<Btn color={C.accent} onClick={start} flex>{elapsed>0?"Resume":"Start"}</Btn>:<Btn color={C.orange} onClick={pause} flex>Pause</Btn>}
          {elapsed>0&&!running&&<><Btn color={C.green} onClick={()=>logIt(elapsed)}>Log {fmtSec(elapsed)}</Btn><Btn color={C.textMuted} onClick={reset} outline>Reset</Btn></>}
        </>)}
      </div>
      {!running&&!completed&&elapsed===0&&<button onClick={()=>logIt(target)} style={{marginTop:8,background:"none",border:"none",color:C.textMuted,fontSize:11,cursor:"pointer",fontFamily:F,padding:0}}>or log {fmtSec(target)} without timer →</button>}
    </div>
  );
}

// ═══ REPS COUNTER ═══
function RepsControl({target,onLog,setNum}){
  const[counting,setCounting]=useState(false),[count,setCount]=useState(0);
  const reset=()=>{setCounting(false);setCount(0)};
  const logIt=v=>{onLog(v);reset()};
  if(!counting)return<div><div style={{fontSize:11,color:C.textMuted,marginBottom:6}}>Set {setNum} → {target} reps</div><div style={{display:"flex",gap:8}}><Btn color={C.accent} onClick={()=>logIt(target)} flex>Log {target} reps</Btn><Btn color={C.textDim} onClick={()=>{setCount(0);setCounting(true)}} outline>Count</Btn></div></div>;
  const cbs={width:52,height:52,borderRadius:26,border:`2px solid ${C.border}`,background:C.card,color:C.text,fontSize:24,fontWeight:600,cursor:"pointer",fontFamily:F,display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent"};
  return(
    <div>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:6}}>Set {setNum} → {target} reps</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,marginBottom:12}}>
        <button onClick={()=>setCount(Math.max(0,count-1))} style={cbs}>−</button>
        <div style={{textAlign:"center"}}><div style={{fontSize:36,fontWeight:700,color:count>=target?C.green:C.text,fontVariantNumeric:"tabular-nums"}}>{count}</div><div style={{fontSize:11,color:C.textMuted}}>/ {target}</div></div>
        <button onClick={()=>setCount(count+1)} style={{...cbs,background:C.accent,color:C.white,borderColor:C.accent}}>+</button>
      </div>
      <div style={{display:"flex",gap:8}}><Btn color={C.green} onClick={()=>logIt(count)} flex>Log {count}</Btn><Btn color={C.textMuted} onClick={reset} outline>Cancel</Btn></div>
    </div>
  );
}

  const[name,setName]=useState(existing?.name||"");
  const[type,setType]=useState(existing?.type||"reps");
  const[baseValue,setBV]=useState(existing?.baseValue?.toString()||"");
  const[sets,setSets]=useState(existing?.sets?.toString()||"3");
  const[maxPerSet,setMax]=useState(existing?.maxPerSet?.toString()||"");
  // Value progression
  const[increment,setInc]=useState(existing?.increment?.toString()||"0");
  const[incDays,setID]=useState(existing?.incrementEveryDays?.toString()||"7");
  // Set progression
  const[setIncrement,setSI]=useState(existing?.setIncrement?.toString()||"0");
  const[setIncDays,setSID]=useState(existing?.setIncrementEveryDays?.toString()||"14");
  // Schedule
  const[schedType,setST]=useState(existing?.schedule?.type||"daily");
  const[schedDays,setSD]=useState(existing?.schedule?.days||[]);

  const handleSave=()=>{
    if(!name.trim()||!baseValue)return;
    let schedule={type:schedType};
    if(schedType==="specific_days")schedule.days=schedDays;
    if(schedType==="every_n_days")schedule.everyN=Number(everyN)||2;
    if(schedType==="x_per_week")schedule.timesPerWeek=Number(xpw)||3;
    const ex={
      id:existing?.id||uid(), name:name.trim(), type,
      baseValue:Number(baseValue), sets:Number(sets)||3,
      maxPerSet:Number(maxPerSet)||0,
      increment:Number(increment)||0, incrementEveryDays:Number(incDays)||7,
      setIncrement:Number(setIncrement)||0, setIncrementEveryDays:Number(setIncDays)||14,
      startDate:existing?.startDate||todayStr(), schedule,
    };
    const exercises=existing?data.exercises.map(e=>e.id===ex.id?ex:e):[...data.exercises,ex];
    save({...data,exercises});onDone();
  };

  // Preview
  const previewEx = {
    baseValue:Number(baseValue)||0, sets:Number(sets)||3, maxPerSet:Number(maxPerSet)||0,
    increment:Number(increment)||0, incrementEveryDays:Number(incDays)||7,
    setIncrement:Number(setIncrement)||0, setIncrementEveryDays:Number(setIncDays)||14,
    startDate:todayStr(), type,
  };
  const previews = [0, Number(incDays)||7, (Number(incDays)||7)*2, (Number(incDays)||7)*4].map(offset=>{
    const d = new Date(); d.setDate(d.getDate()+offset);
    const ds = d.toISOString().slice(0,10);
    const t = computeDayTarget(previewEx, ds);
    return {day:offset+1, ...t};
  });

  const ist={width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:14,fontFamily:F,boxSizing:"border-box"};
  const lb={fontSize:12,fontWeight:600,color:C.textDim,marginBottom:6};
  const lbs={fontSize:11,fontWeight:600,color:C.textMuted,marginBottom:6};

  return(
    <div>
      <h2 style={{fontSize:18,fontWeight:700,margin:"4px 0 20px"}}>{existing?"Edit exercise":"New exercise"}</h2>

      <div style={{marginBottom:16}}><div style={lb}>Name</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Push-ups" style={ist}/></div>

      <div style={{marginBottom:16}}><div style={lb}>Type</div><div style={{display:"flex",gap:8}}>{[["reps","Reps × Sets"],["time","Time × Sets"]].map(([t,l])=><ToggleBtn key={t} active={type===t} onClick={()=>setType(t)}>{l}</ToggleBtn>)}</div></div>

      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{flex:"1 1 80px",minWidth:80}}><div style={lb}>{type==="reps"?"Reps / set":"Seconds / set"}</div><input type="number" value={baseValue} onChange={e=>setBV(e.target.value)} placeholder={type==="reps"?"10":"30"} style={ist}/></div>
        <div style={{flex:"1 1 80px",minWidth:80}}><div style={lb}>Sets</div><input type="number" value={sets} onChange={e=>setSets(e.target.value)} placeholder="3" style={ist}/></div>
        <div style={{flex:"1 1 80px",minWidth:80}}><div style={lb}>Max / set</div><input type="number" value={maxPerSet} onChange={e=>setMax(e.target.value)} placeholder="No cap" style={ist}/></div>
      </div>

      {/* Schedule */}
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:16}}>
        <div style={lb}>Schedule</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>{[["daily","Daily"],["specific_days","Specific days"],["every_n_days","Every N days"],["x_per_week","X / week"]].map(([t,l])=><ToggleBtn key={t} active={schedType===t} onClick={()=>setST(t)} small>{l}</ToggleBtn>)}</div>
        {schedType==="specific_days"&&<div style={{display:"flex",gap:4,marginTop:8}}>{DAYS_SHORT.map((d,i)=><button key={i} onClick={()=>toggleDay(i)} style={{flex:1,padding:"8px 0",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:F,border:`1px solid ${schedDays.includes(i)?C.accent:C.border}`,background:schedDays.includes(i)?C.accentDim:"none",color:schedDays.includes(i)?C.accent:C.textMuted}}>{d}</button>)}</div>}
        {schedType==="every_n_days"&&<div style={{marginTop:8}}><div style={lbs}>Every how many days?</div><input type="number" value={everyN} onChange={e=>setEN(e.target.value)} style={ist}/></div>}
        {schedType==="x_per_week"&&<div style={{marginTop:8}}><div style={lbs}>Times per week</div><input type="number" value={xpw} onChange={e=>setXPW(e.target.value)} style={ist}/></div>}

      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:16}}>

        <div style={{display:"flex",gap:12}}>
          <div style={{flex:1}}><div style={lbs}>+{type==="reps"?"reps":"sec"}</div><input type="number" value={increment} onChange={e=>setInc(e.target.value)} placeholder="0" style={ist}/></div>

        </div>
      </div>

      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:16}}>
        <div style={lb}>Set progression</div>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:8}}>Add more sets over time, independent of value progression.</div>
        <div style={{display:"flex",gap:12}}>
          <div style={{flex:1}}><div style={lbs}>+sets</div><input type="number" value={setIncrement} onChange={e=>setSI(e.target.value)} placeholder="0" style={ist}/></div>
          <div style={{flex:1}}><div style={lbs}>Every N days</div><input type="number" value={setIncDays} onChange={e=>setSID(e.target.value)} placeholder="14" style={ist}/></div>
        </div>
      </div>

      {/* Preview */}
      {Number(baseValue)>0&&(Number(increment)>0||Number(setIncrement)>0)&&(
        <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:20}}>
          <div style={lb}>Progression preview</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {previews.map((p,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}}>
                <span style={{color:C.textMuted}}>Day {p.day}</span>
                <span style={{color:C.text,fontWeight:500}}>
                  {p.breakdown.map(v=>type==="time"?fmtSec(v):v).join(" + ")}
                </span>
                <span style={{color:C.textDim,fontSize:11}}>{p.sets} sets</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:10}}>
        <Btn color={C.textDim} onClick={onDone} outline flex>Cancel</Btn>
        <Btn color={C.accent} onClick={handleSave} flex style={{opacity:name.trim()&&baseValue?1:0.4}}>{existing?"Save":"Add"}</Btn>
      </div>
    </div>
  );
}

    try{
      // Test write
      await syncToSheets(url,data);
      // Test read (small delay for Apps Script to process)
      await new Promise(r=>setTimeout(r,1500));
      const result=await loadFromSheets(url);
      if(result&&result.exercises!==undefined){setTestResult("ok")}
      else{setTestResult("read_fail")}
    }catch{setTestResult("fail")}
    setTimeout(()=>setTestResult(null),4000);
  };
  const exportData=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.download="exercise-data.json";a.click()};

  const ist={width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:14,fontFamily:F,boxSizing:"border-box"};
  const lb={fontSize:12,fontWeight:600,color:C.textDim,marginBottom:6};

  return(
    <div>
      <h2 style={{fontSize:18,fontWeight:700,margin:"4px 0 20px"}}>Settings</h2>
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:16}}>
        <div style={lb}>Google Sheets Sync</div>
        <div style={{fontSize:12,color:C.textDim,marginBottom:10}}>Paste your Apps Script web app URL.</div>
        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec" style={ist}/>
        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
          <Btn color={C.accent} onClick={saveUrl}>{saved?"Saved ✓":"Save URL"}</Btn>
          {url&&<Btn color={C.orange} onClick={testConn} outline>{testResult==="testing"?"Testing…":"Test connection"}</Btn>}
          {sheetsUrl&&<Btn color={C.green} onClick={()=>syncToSheets(sheetsUrl,data)} outline>Sync now</Btn>}
        </div>
        {testResult&&testResult!=="testing"&&(
          <div style={{marginTop:8,fontSize:12,padding:"8px 12px",borderRadius:8,
            background:testResult==="ok"?C.greenDim:C.redDim,
            color:testResult==="ok"?C.green:C.red}}>
            {testResult==="ok"?"✓ Connection works — data synced and verified."
            :testResult==="read_fail"?"⚠ Write sent but read failed. Check: Deploy → Access = 'Anyone', not 'Anyone with Google account'."
            :"✕ Connection failed. Check the URL is a deployed Apps Script web app URL."}
          </div>
        )}
      </div>
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,marginBottom:16}}>
        <div style={lb}>Data</div>
        <div style={{display:"flex",gap:8}}><Btn color={C.accent} onClick={exportData} outline>Export JSON</Btn><Btn color={C.red} onClick={()=>save(defaultData)} outline>Reset all</Btn></div>
      </div>
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`}}>
        <div style={lb}>Apps Script Code</div>
        <div style={{fontSize:11,color:C.textDim,marginBottom:8}}>1. New Google Sheet → Extensions → Apps Script<br/>2. Delete all existing code, paste the below<br/>3. Click Deploy → New deployment<br/>4. Type = Web app, Execute as = Me, Access = Anyone<br/>5. Click Deploy, authorize, copy the URL<br/>6. Paste URL above and hit Save<br/>7. <strong style={{color:C.orange}}>Important:</strong> if you edit the script later, you must create a New deployment (not just save)</div>
        <pre style={{background:C.bg,borderRadius:8,padding:12,fontSize:10,fontFamily:"monospace",color:C.textDim,whiteSpace:"pre-wrap",overflowX:"auto",lineHeight:1.5}}>{`function doGet(e) {
  var sheet = SpreadsheetApp
    .getActiveSpreadsheet()
    .getSheetByName("Data");
  if (!sheet) return json({});
  var val = sheet.getRange("A1").getValue();
  return json(val ? JSON.parse(val) : {});
}

function doPost(e) {
  var raw = e.postData.contents;
  var body = JSON.parse(raw);
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName("Data");
  if (!sheet) sheet = ss.insertSheet("Data");
  sheet.getRange("A1")
    .setValue(JSON.stringify(body.data));
  // Log timestamp in B1 for debugging
  sheet.getRange("B1")
    .setValue(new Date().toISOString());
  return json({ ok: true });
}

function json(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}`}</pre>
      </div>
    </div>
  );
}

// ═══ PROFILE (GitHub-style heatmap) ═══
function ProfileView({data}){
  const today=todayStr();
  const rangeOptions=[
    {label:"1M",months:1},{label:"3M",months:3},{label:"6M",months:6},{label:"1Y",months:12}
  ];
  const[rangeIdx,setRangeIdx]=useState(1); // default 3M
  const months=rangeOptions[rangeIdx].months;

  const cellSize=12,gap=2;
  const dayLabels=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const heatColors=["#161b22","#0e4429","#006d32","#26a641","#39d353"];
  const restColor="#1a1a2e";

  // Date range
  const endDate=new Date(today+"T00:00");
  const startDate=new Date(endDate);
  startDate.setMonth(startDate.getMonth()-months);
  startDate.setDate(startDate.getDate()-startDate.getDay()); // align to Sunday

  // Collect log counts and rest days
  const dayCounts={};
  data.logs.forEach(l=>{
    if(!dayCounts[l.date])dayCounts[l.date]=0;
    dayCounts[l.date]+=l.sets.length;
  });
  const restSet=new Set(data.restDays||[]);
  const maxCount=Math.max(1,...Object.values(dayCounts));

  // Build grid
  const grid=[];
  const cursor=new Date(startDate);
  while(cursor<=endDate){
    const week=[];
    for(let d=0;d<7;d++){
      const ds=cursor.toISOString().slice(0,10);
      const count=dayCounts[ds]||0;
      const isRest=restSet.has(ds);
      const isFuture=ds>today;
      let level=0;
      if(count>0)level=Math.min(4,Math.ceil(count/maxCount*4));
      week.push({date:ds,count,level,isRest,isFuture});
      cursor.setDate(cursor.getDate()+1);
    }
    grid.push(week);
  }

  // Month labels positioned by week index
  const monthLabels=[];
  let lastM=-1;
  grid.forEach((week,wi)=>{
    const mid=week[3]||week[0];
    const m=new Date(mid.date+"T00:00").getMonth();
    if(m!==lastM){monthLabels.push({wi,label:new Date(mid.date+"T00:00").toLocaleDateString("en",{month:"short"})});lastM=m}
  });

  // Stats
  const allDates=[...new Set(data.logs.map(l=>l.date))].sort();
  const totalWorkouts=allDates.length;
  const totalSets=data.logs.reduce((s,l)=>s+l.sets.length,0);

  let streak=0;
  const sd=new Date(today+"T00:00");
  while(true){
    const ds=sd.toISOString().slice(0,10);
    if(dayCounts[ds]>0||restSet.has(ds)){streak++;sd.setDate(sd.getDate()-1)}
    else break;
  }

  let longest=0,cur=0;
  if(allDates.length){
    const dd=new Date(allDates[0]+"T00:00");
    const end2=new Date(today+"T00:00");
    while(dd<=end2){
      const ds=dd.toISOString().slice(0,10);
      if(dayCounts[ds]>0||restSet.has(ds)){cur++;longest=Math.max(longest,cur)}else{cur=0}
      dd.setDate(dd.getDate()+1);
    }
  }

  const[tooltip,setTooltip]=useState(null); // {day, x, y}
  const gridRef=useRef(null);

  const gridW=grid.length*(cellSize+gap);
  const labelW=32;

  return(
    <div>
      <h2 style={{fontSize:18,fontWeight:700,margin:"4px 0 16px"}}>Activity</h2>

      {/* Stats */}
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        {[[streak,"Current streak","🔥"],[longest,"Longest streak","⚡"],[totalWorkouts,"Workouts","💪"],[totalSets,"Total sets","📊"]].map(([val,label,icon],i)=>(
          <div key={i} style={{flex:"1 1 80px",background:C.card,borderRadius:10,padding:"12px 10px",border:`1px solid ${C.border}`,textAlign:"center",minWidth:70}}>
            <div style={{fontSize:10,marginBottom:2}}>{icon}</div>
            <div style={{fontSize:20,fontWeight:700,color:i===0&&streak>0?"#f6c744":C.text}}>{val}</div>
            <div style={{fontSize:9,color:C.textMuted,marginTop:2}}>{label}</div>
          </div>
        ))}
      </div>

      {/* Range selector */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {rangeOptions.map((r,i)=>(
          <button key={i} onClick={()=>setRangeIdx(i)} style={{
            padding:"6px 14px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:F,
            border:`1px solid ${rangeIdx===i?C.accent:C.border}`,
            background:rangeIdx===i?C.accentDim:"none",
            color:rangeIdx===i?C.accent:C.textMuted,
          }}>{r.label}</button>
        ))}
      </div>

      {/* Heatmap */}
      <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>

        {/* Month labels row */}
        <div style={{display:"flex",marginLeft:labelW,height:16,position:"relative",marginBottom:4}}>
          {monthLabels.map((m,i)=>(
            <div key={i} style={{
              position:"absolute",left:m.wi*(cellSize+gap),
              fontSize:10,color:C.textMuted,whiteSpace:"nowrap",
            }}>{m.label}</div>
          ))}
        </div>

        <div style={{display:"flex"}}>
          {/* Day labels */}
          <div style={{display:"flex",flexDirection:"column",gap:gap,width:labelW,flexShrink:0}}>
            {dayLabels.map((d,i)=>(
              <div key={i} style={{height:cellSize,fontSize:9,color:C.textMuted,display:"flex",alignItems:"center"}}>{d}</div>
            ))}
          </div>

          {/* Scrollable grid */}
          <div ref={gridRef} style={{overflowX:"auto",overflowY:"hidden",flex:1,paddingBottom:4,position:"relative"}}>
            <div style={{display:"flex",gap:gap,width:gridW}}>
              {grid.map((week,wi)=>(
                <div key={wi} style={{display:"flex",flexDirection:"column",gap:gap}}>
                  {week.map((day,di)=>{
                    const showTip=(e)=>{
                      if(day.isFuture)return;
                      const rect=e.currentTarget.getBoundingClientRect();
                      const pr=gridRef.current?.getBoundingClientRect();
                      if(!pr)return;
                      setTooltip({day,x:rect.left-pr.left+cellSize/2,y:rect.top-pr.top});
                    };
                    return(
                    <div key={di}
                      onMouseEnter={showTip}
                      onMouseLeave={()=>setTooltip(null)}
                      onClick={showTip}
                      style={{
                        width:cellSize,height:cellSize,borderRadius:2,cursor:"pointer",
                        background:day.isFuture?"transparent":day.isRest?restColor:heatColors[day.level],
                        border:day.date===today?`1.5px solid ${C.accent}`:"1.5px solid transparent",
                      }}
                    />
                  )})}
                </div>
              ))}
            </div>

            {/* Floating tooltip */}
            {tooltip&&(
              <div style={{
                position:"absolute",
                left:Math.max(0,Math.min(tooltip.x-75,(gridW||300)-160)),
                top:tooltip.y-40,
                background:"#1e2433",border:`1px solid ${C.border}`,
                borderRadius:6,padding:"6px 10px",fontSize:11,color:C.textDim,
                whiteSpace:"nowrap",pointerEvents:"none",zIndex:20,
                boxShadow:"0 4px 12px rgba(0,0,0,0.5)",
              }}>
                <strong style={{color:C.text}}>{fmtDate(tooltip.day.date)}</strong>
                {tooltip.day.isRest&&!tooltip.day.count?" — Rest day"
                :tooltip.day.count>0?` — ${tooltip.day.count} sets`
                :" — No activity"}
              </div>
            )}
          </div>
        </div>

        {/* Legend */}
        <div style={{display:"flex",alignItems:"center",gap:4,marginTop:12,fontSize:10,color:C.textMuted}}>
          <span>Less</span>
          {heatColors.map((c,i)=><div key={i} style={{width:cellSize,height:cellSize,borderRadius:2,background:c}}/>)}
          <span>More</span>
          <div style={{width:8}}/>
          <div style={{width:cellSize,height:cellSize,borderRadius:2,background:restColor}}/>
          <span>Rest</span>
        </div>
      </div>

      {/* Per-exercise breakdown */}
      {data.exercises.length>0&&(
        <div style={{marginTop:16}}>
          <div style={{fontSize:13,fontWeight:600,color:C.textDim,marginBottom:8}}>Per exercise (last 30 days)</div>
          {data.exercises.map(ex=>{
            const d30=new Date();d30.setDate(d30.getDate()-30);
            const d30s=d30.toISOString().slice(0,10);
            const exLogs=data.logs.filter(l=>l.exerciseId===ex.id&&l.date>=d30s);
            const days=new Set(exLogs.map(l=>l.date)).size;
            const sets=exLogs.reduce((s,l)=>s+l.sets.length,0);
            const totalVol=exLogs.reduce((s,l)=>s+l.sets.reduce((a,v)=>a+v,0),0);
            return(
              <div key={ex.id} style={{background:C.card,borderRadius:8,padding:"10px 14px",marginBottom:6,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,fontWeight:500}}>{ex.name}</span>
                  <span style={{fontSize:11,color:C.textDim}}>
                    {days}d · {sets} sets · {ex.type==="time"?fmtSec(totalVol):`${totalVol} reps`}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ═══ PRIMITIVES ═══
function Btn({color,onClick,children,outline,flex,style:s}){return<button onClick={onClick} style={{padding:"10px 16px",borderRadius:8,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:F,border:outline?`1px solid ${color}44`:"none",background:outline?"none":color,color:outline?color:C.white,flex:flex?1:undefined,...s}}>{children}</button>}
function SmallBtn({onClick,children,color}){return<button onClick={onClick} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:"none",color:color||C.textDim,fontSize:11,cursor:"pointer",fontFamily:F}}>{children}</button>}
function ToggleBtn({active,onClick,children,small}){return<button onClick={onClick} style={{flex:1,padding:small?"8px 10px":"10px 0",borderRadius:8,border:`1px solid ${active?C.accent:C.border}`,background:active?C.accentDim:"none",color:active?C.accent:C.textDim,fontWeight:600,fontSize:small?11:13,cursor:"pointer",fontFamily:F}}>{children}</button>}
function Empty({msg}){return<div style={{textAlign:"center",padding:"60px 20px",color:C.textMuted,fontSize:14}}>{msg}</div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
